<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consejo Ascendido - Hermandad Blanca</title>
    <style>
        /* (usa los mismos estilos del prototipo anterior, pero sin el panel de API Key) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: linear-gradient(145deg, #0a0818 0%, #15122e 100%); min-height: 100vh; padding: 20px; }
        .app-container { max-width: 1400px; margin: 0 auto; background: rgba(255,255,255,0.05); border-radius: 2rem; padding: 1.5rem; }
        h1 { color: #f3e9c0; text-align: center; }
        .sub { text-align: center; color: #b9b3e6; margin-bottom: 1.5rem; }
        .masters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .master-card { background: linear-gradient(135deg, #2a2438, #1e1a2f); border-radius: 1.2rem; padding: 1rem; text-align: center; cursor: pointer; border: 1px solid rgba(255,215,0,0.3); }
        .master-card:hover { transform: translateY(-5px); background: #3a3455; }
        .master-avatar { font-size: 2.5rem; }
        .master-name { font-weight: bold; color: #ffecb3; }
        .chat-panel { background: rgba(10,8,22,0.95); border-radius: 1.8rem; display: none; flex-direction: column; height: 500px; }
        .chat-header { display: flex; align-items: center; gap: 1rem; padding: 1rem; background: #0e0b1e; border-radius: 1.8rem 1.8rem 0 0; }
        .chat-master-img { font-size: 2.5rem; }
        .speaking { animation: pulse 0.6s infinite alternate; }
        @keyframes pulse { 0% { filter: drop-shadow(0 0 2px gold); } 100% { filter: drop-shadow(0 0 12px orange); transform: scale(1.05); } }
        .back-btn { margin-left: auto; background: #2a2642; border: none; padding: 0.4rem 1rem; border-radius: 2rem; color: white; cursor: pointer; }
        .messages-area { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.7rem; }
        .message { display: flex; gap: 0.6rem; max-width: 85%; }
        .user-message { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { background: #2e2a48; padding: 0.6rem 1rem; border-radius: 1.4rem; color: #efebf5; }
        .user-message .msg-bubble { background: #5f4b9e; }
        .typing-indicator { background: #27223f; width: fit-content; padding: 0.4rem 1rem; border-radius: 1.8rem; font-style: italic; }
        .input-area { display: flex; gap: 0.6rem; padding: 1rem; background: #0b0920; border-radius: 0 0 1.8rem 1.8rem; }
        #messageInput { flex: 1; background: #221e3a; border: none; padding: 0.7rem 1rem; border-radius: 2rem; color: white; }
        button { background: #7c66ba; border: none; padding: 0.5rem 1.2rem; border-radius: 2rem; color: white; cursor: pointer; }
        footer { text-align: center; font-size: 0.7rem; color: #8d85b0; margin-top: 1rem; }
    </style>
</head>
<body>
<div class="app-container">
    <h1>✨ CONSEJO ASCENDIDO ✨</h1>
    <div class="sub">Maestros de la Gran Hermandad Blanca</div>

    <div class="masters-grid" id="mastersGrid"></div>

    <div id="chatPanel" class="chat-panel">
        <div class="chat-header">
            <div id="chatMasterAvatar" class="chat-master-img">✨</div>
            <div><div id="chatMasterName" style="font-weight:bold">Maestro</div><div id="chatMasterRayo" style="font-size:0.7rem">Rayo</div></div>
            <button id="closeChatBtn" class="back-btn">◀ Volver</button>
        </div>
        <div id="messagesArea" class="messages-area">
            <div class="message"><div class="msg-avatar">✨</div><div class="msg-bubble">Elige un maestro y escribe tu pregunta.</div></div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Escribe tu consulta...">
            <button id="sendBtn">Enviar ✨</button>
        </div>
    </div>
    <footer>Respuestas generadas por IA | Basado en las enseñanzas de la Gran Hermandad Blanca</footer>
</div>

<script>
    const BACKEND_URL = "https://maestros-ascendidos.onrender.com/";

    const mastersList = [
        { id: "jesus", name: "Jesús", rayo: "Resurrección", avatar: "✝️" },
        { id: "maria", name: "Virgen María", rayo: "Llama Rosa", avatar: "🌹" },
        { id: "germain", name: "San Germain", rayo: "Llama Violeta", avatar: "🟣" },
        { id: "kuthumi", name: "Kuthumi", rayo: "Sabiduría", avatar: "📜" },
        { id: "lady_nada", name: "Lady Nada", rayo: "Amor Divino", avatar: "💗" },
        { id: "serapis", name: "Serapis Bey", rayo: "Ascensión", avatar: "🔱" },
        { id: "elmorya", name: "El Morya", rayo: "Voluntad", avatar: "⚜️" },
        { id: "buda", name: "Buda", rayo: "Iluminación", avatar: "☸️" },
        { id: "magdalena", name: "Magdalena", rayo: "Unión Sagrada", avatar: "🌊" }
    ];

    let currentMaster = null;
    let isProcessing = false;

    const mastersGrid = document.getElementById('mastersGrid');
    const chatPanel = document.getElementById('chatPanel');
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatMasterAvatar = document.getElementById('chatMasterAvatar');
    const chatMasterName = document.getElementById('chatMasterName');
    const chatMasterRayo = document.getElementById('chatMasterRayo');

    function renderMasters() {
        mastersGrid.innerHTML = "";
        mastersList.forEach(m => {
            const card = document.createElement('div');
            card.className = 'master-card';
            card.innerHTML = `<div class="master-avatar">${m.avatar}</div><div class="master-name">${m.name}</div><div class="master-rayo">${m.rayo}</div>`;
            card.onclick = () => openChat(m);
            mastersGrid.appendChild(card);
        });
    }

    function openChat(master) {
        currentMaster = master;
        chatMasterAvatar.textContent = master.avatar;
        chatMasterName.textContent = master.name;
        chatMasterRayo.textContent = master.rayo;
        messagesArea.innerHTML = `<div class="message"><div class="msg-avatar">${master.avatar}</div><div class="msg-bubble">Bendiciones, soy ${master.name}. ¿Qué te trae hoy?</div></div>`;
        chatPanel.style.display = "flex";
        messageInput.value = "";
        chatMasterAvatar.classList.remove('speaking');
    }

    function closeChat() {
        chatPanel.style.display = "none";
        currentMaster = null;
    }

    async function sendMessage() {
        const userText = messageInput.value.trim();
        if (!userText || !currentMaster || isProcessing) return;
        isProcessing = true;
        addMessage(userText, 'user');
        messageInput.value = '';
        showTyping();
        chatMasterAvatar.classList.add('speaking');
        try {
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ masterId: currentMaster.id, userMessage: userText })
            });
            if (!response.ok) throw new Error('Error en el servidor');
            const data = await response.json();
            removeTyping();
            addMessage(data.reply, 'master');
        } catch (error) {
            removeTyping();
            addMessage("Lo siento, no pude conectar con el servidor. ¿Está el backend funcionando?", 'master');
        } finally {
            chatMasterAvatar.classList.remove('speaking');
            isProcessing = false;
        }
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender === 'user' ? 'user-message' : ''}`;
        const avatar = sender === 'user' ? '👤' : currentMaster.avatar;
        div.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-bubble">${escapeHtml(text)}</div>`;
        messagesArea.appendChild(div);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function showTyping() {
        const typing = document.createElement('div');
        typing.className = 'typing-indicator';
        typing.id = 'typingIndicator';
        typing.innerHTML = `✨ ${currentMaster.name} medita... ✨`;
        messagesArea.appendChild(typing);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function removeTyping() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    sendBtn.onclick = sendMessage;
    messageInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    document.getElementById('closeChatBtn').onclick = closeChat;

    renderMasters();
</script>
</body>
</html>
